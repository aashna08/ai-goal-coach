# Default Goal Coach settings (classpath). Override order:
#   JVM -Dproperty > environment variable > this file (plus optional external overlay) > code fallback
#
# Optional extra file on disk (merged on top of this file):
#   -Dgoalcoach.config.path=/absolute/path/goalcoach.local.properties
#   GOALCOACH_CONFIG_PATH=/absolute/path/goalcoach.local.properties
#
# Keep engine=stub here so CI and `mvn test` stay deterministic. For local Ollama, use env vars,
# -D flags, or a gitignored overlay file (see SETUP_GUIDE.md).

# stub | ollama
goalcoach.engine=ollama

goalcoach.ollama.baseUrl=http://localhost:11434
goalcoach.ollama.model=llama3
goalcoach.ollama.connectTimeoutMs=2000
# Local LLMs (especially "thinking" models) often exceed 60s first token / generation.
goalcoach.ollama.requestTimeoutMs=300000

# htmlunit | chrome | edge
goalcoach.webdriver=chrome
goalcoach.headless=true
goalcoach.webdrivermanager=false

# Leave blank to use headed-browser defaults in UI tests (see GoalCoachUiSeleniumTest).
goalcoach.ui.holdOpenMs=2000
goalcoach.ui.stepDelayMs=2000
